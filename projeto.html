<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo/logo-mezani-4.png">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WT77DP8T4E"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WT77DP8T4E');
  </script>
  <title>Detalhes do Projeto | Mezani</title>
  <style>
    @font-face {
      font-family: 'Urbane';
      src: url('arquivos/Urbane/Urbane-Medium.woff2') format('woff2'),
           url('arquivos/Urbane/Urbane-Medium.woff') format('woff');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Urbane';
      src: url('arquivos/Urbane/Urbane-Bold.woff2') format('woff2'),
           url('arquivos/Urbane/Urbane-Bold.woff') format('woff');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --preto: #282828;
      --escuro: #282828;
      --card-bg: #282828;
      --laranja: #EB5B1D;
      --branco: #FFFFFF;
      --cinza: #959595;
      --bege: #E2C9B0;
      --borda: rgba(255,255,255,.14);
      --fonte-titulo: 'Urbane', sans-serif;
      --fonte-corpo: 'Urbane', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--preto); color: var(--branco); font-family: var(--fonte-corpo); }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 5vw;
      background: rgba(10,10,10,0.75); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--borda);
      transition: background .3s ease, box-shadow .35s ease;
    }
    nav.nav--scrolled { box-shadow: 0 12px 40px rgba(0,0,0,.42); }
    .logo-wrap { display: flex; align-items: center; gap: .7rem; }
    .logo-link { display: flex; align-items: center; text-decoration: none; line-height: 0; }
    .logo-img { height: 46px; width: auto; max-width: min(200px, 46vw); object-fit: contain; display: block; transition: transform .28s ease; }
    nav.nav--scrolled .logo-img { transform: scale(.94); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.65); text-decoration: none; transition: color .2s; }
    .nav-links a:hover { color: #fff; }
    .nav-cta {
      background: var(--laranja); color: #fff; border: none; font-family: var(--fonte-corpo); font-size: .76rem;
      font-weight: 500; letter-spacing: .08em; text-transform: uppercase; padding: .6rem 1.4rem; cursor: pointer;
      text-decoration: none; transition: background .2s; border-radius: 2px;
    }
    .nav-cta:hover { background: #f07234; }
    .hamburger {
      display: none; flex-direction: column; gap: 5px; cursor: pointer;
      border: none; background: transparent; color: inherit; padding: 0; margin: 0;
      -webkit-appearance: none; appearance: none;
    }
    .hamburger span { display: block; width: 22px; height: 1.5px; background: #fff; transition: all .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-menu {
      display: none; position: fixed; top: 0; left: 0; right: 0; padding-top: 6.2rem; background: rgba(10,10,10,.97);
      backdrop-filter: blur(16px); padding-left: 5vw; padding-right: 5vw; padding-bottom: 2rem; flex-direction: column;
      gap: .5rem; z-index: 199; border-bottom: 1px solid var(--borda);
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: .85rem; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.75);
      text-decoration: none; padding: .85rem 0; min-height: 48px; display: flex; align-items: center;
      border-bottom: 1px solid var(--borda);
    }
    .wrap { width: min(1100px, 94vw); margin: 0 auto; padding: 7.2rem 0 2rem; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.1rem; gap: .8rem; }
    .btn { border: 1px solid var(--borda); color: var(--branco); text-decoration: none; padding: .55rem .85rem; border-radius: 6px; transition: background .2s ease, border-color .2s ease; }
    .btn:hover { border-color: rgba(232,98,26,.45); background: rgba(232,98,26,.08); }
    .hero { border: 1px solid var(--borda); background: var(--card-bg); border-radius: 10px; overflow: hidden; }
    .hero img { width: 100%; height: min(65vh, 520px); object-fit: cover; display: block; }
    .body { padding: 1rem; }
    h1 { font-family: var(--fonte-titulo); font-size: clamp(1.5rem, 2.4vw, 2rem); margin-bottom: .45rem; }
    .tag { display: inline-block; border: 1px solid rgba(232,98,26,.45); color: var(--laranja); border-radius: 999px; padding: .16rem .55rem; font-size: .72rem; text-transform: uppercase; margin-bottom: .8rem; }
    .desc { color: var(--cinza); line-height: 1.78; }
    .gallery { margin-top: 1.2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: .75rem; }
    .thumb { border: 1px solid var(--borda); border-radius: 6px; overflow: hidden; cursor: pointer; background: #111; }
    .thumb img { width: 100%; height: 130px; object-fit: cover; display: block; transition: transform .2s ease; }
    .thumb:hover img { transform: scale(1.04); }
    .empty { color: var(--cinza); border: 1px dashed var(--borda); border-radius: 8px; padding: 1rem; }
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,.88); display: none;
      align-items: center; justify-content: center; padding: 1rem; z-index: 999;
    }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: min(1200px, 96vw); max-height: 90vh; object-fit: contain; }
    .close { position: absolute; top: 18px; right: 18px; background: #fff; color: #111; border: 0; border-radius: 999px; width: 34px; height: 34px; cursor: pointer; }
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%); width: 42px; height: 42px;
      border: 0; border-radius: 999px; background: rgba(255,255,255,.92); color: #111; cursor: pointer;
      font-size: 1.4rem; line-height: 1;
    }
    .lb-prev { left: 14px; }
    .lb-next { right: 14px; }
    @media (max-width: 960px) {
      .nav-links, .nav-cta { display: none; }
      .hamburger {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 44px;
        min-height: 44px;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body>
  <nav id="navbar">
    <div class="logo-wrap">
      <a href="index.html#hero" class="logo-link" aria-label="Mezani Engenharia — início">
        <img src="logo/logo-mezani-1.png" alt="Mezani Engenharia e Serviços" class="logo-img" width="200" height="92" />
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="index.html#servicos">Serviços</a></li>
      <li><a href="index.html#projetos">Projetos</a></li>
      <li><a href="index.html#sobre">Sobre</a></li>
      <li><a href="index.html#processo">Processo</a></li>
      <li><a href="index.html#depoimentos">Clientes</a></li>
      <li><a href="internal.html">Sistema Interno</a></li>
    </ul>
    <a href="index.html#contato" class="nav-cta">Iniciar Projeto ↗</a>
    <button type="button" class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Abrir menu" aria-expanded="false" aria-controls="mobileMenu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobileMenu" role="navigation" aria-label="Menu principal">
    <a href="index.html#servicos" onclick="toggleMenu()">Serviços</a>
    <a href="index.html#projetos" onclick="toggleMenu()">Projetos</a>
    <a href="index.html#sobre" onclick="toggleMenu()">Sobre</a>
    <a href="index.html#processo" onclick="toggleMenu()">Processo</a>
    <a href="index.html#depoimentos" onclick="toggleMenu()">Clientes</a>
    <a href="index.html#contato" onclick="toggleMenu()">Contato</a>
    <a href="internal.html">Sistema Interno</a>
  </div>
  <div class="wrap">
    <div class="top">
      <a class="btn" href="index.html#projetos">Voltar para projetos</a>
      <span style="color:var(--cinza); font-size:.9rem;">Detalhes completos do projeto</span>
    </div>
    <section id="projectContainer"></section>
  </div>

  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
    <button class="lb-nav lb-prev" id="lightboxPrev" type="button" aria-label="Imagem anterior">‹</button>
    <button class="lb-nav lb-next" id="lightboxNext" type="button" aria-label="Próxima imagem">›</button>
    <button class="close" id="closeLightbox" type="button">x</button>
    <img id="lightboxImg" alt="Foto ampliada do projeto">
  </div>

  <script>
    function toggleMenu() {
      const hamburger = document.getElementById('hamburger');
      const menu = document.getElementById('mobileMenu');
      hamburger.classList.toggle('open');
      menu.classList.toggle('open');
      const open = menu.classList.contains('open');
      hamburger.setAttribute('aria-expanded', open ? 'true' : 'false');
      hamburger.setAttribute('aria-label', open ? 'Fechar menu' : 'Abrir menu');
    }
    function updateNavbar() {
      const nav = document.getElementById('navbar');
      const y = window.scrollY;
      nav.style.background = y > 50 ? 'rgba(10,10,10,.98)' : 'rgba(10,10,10,.75)';
      nav.classList.toggle('nav--scrolled', y > 50);
    }
    window.addEventListener('scroll', updateNavbar);
    updateNavbar();

    function getProjectIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    async function renderProject() {
      const container = document.getElementById('projectContainer');
      const pid = getProjectIdFromUrl();
      if (!pid) {
        container.innerHTML = '<div class="empty">Projeto não encontrado. Volte ao site e selecione um projeto válido.</div>';
        return;
      }
      let project = null;
      try {
        const res = await fetch('api/projects.php?id=' + encodeURIComponent(pid), { credentials: 'include' });
        const data = await res.json();
        project = data && data.project ? data.project : null;
      } catch (e) {
        project = null;
      }
      if (!project) {
        container.innerHTML = '<div class="empty">Projeto não encontrado. Volte ao site e selecione um projeto válido.</div>';
        return;
      }
      const mainPhoto = Array.isArray(project.photos) && project.photos[0] ? project.photos[0] : '';
      const safeName = (project.name || '').replace(/</g, '&lt;');
      const safeDesc = (project.description || '').replace(/</g, '&lt;');
      const safeStatus = (project.statusLabel || 'Projeto').replace(/</g, '&lt;');
      const photos = Array.isArray(project.photos) ? project.photos : [];
      container.innerHTML =
        '<article class="hero">' +
          (mainPhoto ? '<img src="' + String(mainPhoto).replace(/"/g, '&quot;') + '" alt="' + safeName + '">' : '') +
          '<div class="body">' +
            '<span class="tag">' + safeStatus + '</span>' +
            '<h1>' + safeName + '</h1>' +
            '<p class="desc">' + safeDesc + '</p>' +
            '<div class="gallery">' +
              photos.map(function (photo, i) {
                const src = String(photo).replace(/"/g, '&quot;');
                return '<button class="thumb" type="button" data-src="' + src + '" aria-label="Abrir foto ' + (i + 1) + '">' +
                  '<img src="' + src + '" alt="Foto ' + (i + 1) + ' de ' + safeName + '">' +
                '</button>';
              }).join('') +
            '</div>' +
          '</div>' +
        '</article>';
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightboxImg');
      const closeLightbox = document.getElementById('closeLightbox');
      const lightboxPrev = document.getElementById('lightboxPrev');
      const lightboxNext = document.getElementById('lightboxNext');
      const photoList = project && Array.isArray(project.photos) ? project.photos : [];
      let currentPhotoIndex = 0;
      function showLightboxPhoto(index) {
        if (!photoList.length) return;
        if (index < 0) currentPhotoIndex = photoList.length - 1;
        else if (index >= photoList.length) currentPhotoIndex = 0;
        else currentPhotoIndex = index;
        lightboxImg.src = String(photoList[currentPhotoIndex] || '');
        lightbox.classList.add('open');
      }
      document.addEventListener('click', function (e) {
        const thumb = e.target.closest('.thumb');
        if (thumb) {
          const clickedSrc = thumb.getAttribute('data-src') || '';
          const foundIdx = photoList.findIndex(function (p) { return String(p) === String(clickedSrc); });
          showLightboxPhoto(foundIdx >= 0 ? foundIdx : 0);
        }
        if (e.target === lightbox) {
          lightbox.classList.remove('open');
        }
      });
      lightboxPrev.addEventListener('click', function () {
        showLightboxPhoto(currentPhotoIndex - 1);
      });
      lightboxNext.addEventListener('click', function () {
        showLightboxPhoto(currentPhotoIndex + 1);
      });
      closeLightbox.addEventListener('click', function () {
        lightbox.classList.remove('open');
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') lightbox.classList.remove('open');
        if (!lightbox.classList.contains('open')) return;
        if (e.key === 'ArrowLeft') showLightboxPhoto(currentPhotoIndex - 1);
        if (e.key === 'ArrowRight') showLightboxPhoto(currentPhotoIndex + 1);
      });
    }
    renderProject();
  </script>
</body>
</html>
